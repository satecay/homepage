<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--tr:all .22s ease;}
[data-theme="light"]{--bg:#f4f2ee;--paper:#faf9f6;--ink:#1a1714;--ink2:#5a5650;--ink3:#b0ada7;--line:#e2dfd9;--hover:rgba(26,23,20,.04);--shadow:rgba(26,23,20,.14);--chip-bg:#f0ede8;--chip-hover:#e8e4dd;}
[data-theme="dark"]{--bg:#111110;--paper:#1a1917;--ink:#f0ede8;--ink2:#a09d98;--ink3:#5a5750;--line:#2e2c29;--hover:rgba(240,237,232,.05);--shadow:rgba(0,0,0,.45);--chip-bg:#242220;--chip-hover:#2e2c29;}
[data-theme="light"]{--web-bg:#eff6ff;--web-t:#2563eb;--file-bg:#f0fdf4;--file-t:#16a34a;--dir-bg:#fffbeb;--dir-t:#d97706;--app-bg:#faf5ff;--app-t:#9333ea;--priv-bg:#fff1f2;--priv-t:#e11d48;}
[data-theme="dark"]{--web-bg:#1e2d4a;--web-t:#93c5fd;--file-bg:#162a1f;--file-t:#86efac;--dir-bg:#2a2010;--dir-t:#fcd34d;--app-bg:#22103a;--app-t:#d8b4fe;--priv-bg:#2a0f16;--priv-t:#fda4af;}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:var(--bg);color:var(--ink);font-family:'Outfit',sans-serif;font-weight:400;line-height:1;min-height:100vh;transition:background .22s,color .22s;}
.shell{display:grid;grid-template-columns:272px 1fr;min-height:100vh;}

/* ── SIDEBAR ── */
aside{background:var(--paper);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:26px 20px;position:sticky;top:0;height:100vh;overflow-y:auto;transition:background .22s,border-color .22s;}
.brand{font-family:'DM Serif Display',serif;font-size:1.3rem;letter-spacing:-.01em;color:var(--ink);margin-bottom:2px;}
.tagline{font-size:.62rem;color:var(--ink3);letter-spacing:.09em;text-transform:uppercase;font-weight:500;margin-bottom:18px;}

.theme-toggle{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;border:1px solid var(--line);background:var(--chip-bg);cursor:pointer;transition:var(--tr);margin-bottom:16px;width:100%;}
.theme-toggle:hover{background:var(--chip-hover);border-color:var(--ink3);}
.toggle-track{width:32px;height:17px;border-radius:99px;background:var(--line);position:relative;flex-shrink:0;transition:background .22s;}
[data-theme="dark"] .toggle-track{background:var(--ink2);}
.toggle-thumb{position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:var(--paper);transition:transform .22s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
[data-theme="dark"] .toggle-thumb{transform:translateX(15px);}
.toggle-label{font-size:.73rem;font-weight:500;color:var(--ink2);}
.toggle-ico{font-size:.85rem;margin-left:auto;}

.clock-block{margin-bottom:16px;}
#clock{font-family:'DM Mono',monospace;font-size:1.9rem;font-weight:400;letter-spacing:-.03em;color:var(--ink);line-height:1;}
#date-solar{font-size:.67rem;color:var(--ink2);margin-top:5px;letter-spacing:.02em;line-height:1.6;}
#date-lunar{font-size:.64rem;color:var(--ink3);margin-top:1px;font-style:italic;line-height:1.5;}

.weather-card{background:var(--chip-bg);border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:18px;min-height:58px;position:relative;transition:var(--tr);}
.weather-loading{font-size:.7rem;color:var(--ink3);display:flex;align-items:center;gap:6px;}
.weather-body{display:flex;align-items:center;gap:10px;}
.weather-icon{font-size:1.8rem;line-height:1;flex-shrink:0;}
.weather-temp{font-family:'DM Mono',monospace;font-size:1.45rem;font-weight:500;letter-spacing:-.04em;line-height:1;color:var(--ink);}
.weather-desc{font-size:.66rem;color:var(--ink2);margin-top:3px;}
.weather-city{font-size:.6rem;color:var(--ink3);margin-top:2px;}
.weather-extra{display:flex;gap:8px;margin-top:6px;padding-top:6px;border-top:1px solid var(--line);}
.weather-stat{font-size:.6rem;color:var(--ink3);display:flex;align-items:center;gap:3px;}
.weather-stat b{color:var(--ink2);font-weight:600;}
.weather-retry{position:absolute;top:8px;right:8px;background:none;border:none;cursor:pointer;font-size:.62rem;color:var(--ink3);padding:2px 5px;border-radius:5px;transition:all .15s;}
.weather-retry:hover{background:var(--hover);color:var(--ink);}

.search-wrap{position:relative;margin-bottom:20px;}
.search-wrap input{width:100%;background:var(--chip-bg);border:1px solid var(--line);border-radius:8px;padding:8px 14px 8px 32px;font-family:'Outfit',sans-serif;font-size:.78rem;color:var(--ink);outline:none;transition:var(--tr);}
.search-wrap input::placeholder{color:var(--ink3);}
.search-wrap input:focus{border-color:var(--ink2);box-shadow:0 0 0 3px rgba(128,128,128,.1);}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--ink3);}

.nav-label{font-size:.59rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px;}
.nav-groups{display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto;}
.nav-item{display:flex;align-items:center;justify-content:space-between;padding:6px 9px;border-radius:7px;cursor:pointer;transition:background .15s;font-size:.77rem;color:var(--ink2);font-weight:500;}
.nav-item:hover{background:var(--hover);color:var(--ink);}
.nav-item .lock-ico{font-size:.6rem;opacity:.5;}
.nav-count{font-family:'DM Mono',monospace;font-size:.63rem;opacity:.45;}

.sidebar-footer{margin-top:auto;padding-top:14px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:2px;}
.sb-btn{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:7px;border:none;background:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.77rem;font-weight:500;color:var(--ink2);transition:background .15s,color .15s;width:100%;text-align:left;}
.sb-btn:hover{background:var(--hover);color:var(--ink);}

/* ── MAIN ── */
main{padding:38px 48px;min-height:100vh;}
.group-section{margin-bottom:38px;animation:fadeUp .3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.group-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;padding-bottom:11px;border-bottom:1px solid var(--line);}
.group-name{font-family:'DM Serif Display',serif;font-size:1.4rem;letter-spacing:-.02em;color:var(--ink);display:flex;align-items:center;gap:8px;}
.group-lock-badge{font-size:.65rem;background:var(--priv-bg);color:var(--priv-t);border:1px solid color-mix(in srgb,var(--priv-t) 30%,transparent);border-radius:20px;padding:2px 8px;font-family:'DM Mono',monospace;letter-spacing:.04em;font-style:normal;}
.group-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
.group-count{font-family:'DM Mono',monospace;font-size:.64rem;color:var(--ink3);margin-right:2px;}
.grp-btn{background:none;border:1px solid var(--line);border-radius:6px;padding:3px 8px;font-size:.64rem;font-family:'Outfit',sans-serif;font-weight:500;color:var(--ink3);cursor:pointer;letter-spacing:.04em;transition:all .15s;}
.grp-btn:hover{border-color:var(--ink2);color:var(--ink);}
.grp-btn.danger:hover{border-color:#ef4444;color:#ef4444;}
.grp-btn.unlock-btn{border-color:color-mix(in srgb,var(--priv-t) 40%,transparent);color:var(--priv-t);background:var(--priv-bg);}
.grp-btn.unlock-btn:hover{border-color:var(--priv-t);}

/* Chips */
.shortcut-chips{display:flex;flex-wrap:wrap;gap:7px;min-height:32px;}
.sc-chip{display:inline-flex;align-items:center;gap:8px;padding:7px 12px 7px 10px;background:var(--chip-bg);border:1px solid var(--line);border-radius:40px;cursor:pointer;transition:background .15s,border-color .15s,transform .15s,box-shadow .15s;position:relative;color:var(--ink);animation:chipIn .22s ease both;}
@keyframes chipIn{from{opacity:0;transform:scale(.93);}to{opacity:1;transform:scale(1);}}
.sc-chip:hover{background:var(--chip-hover);border-color:var(--ink3);transform:translateY(-1px);box-shadow:0 3px 10px var(--shadow);}
.sc-chip:active{transform:translateY(0);box-shadow:none;}
.chip-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dot-web{background:var(--web-t);}.dot-file{background:var(--file-t);}.dot-dir{background:var(--dir-t);}.dot-app{background:var(--app-t);}
.chip-name{font-size:.81rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;color:var(--ink);}
.chip-badge{font-family:'DM Mono',monospace;font-size:.55rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:4px;flex-shrink:0;}
.badge-web{background:var(--web-bg);color:var(--web-t);}.badge-file{background:var(--file-bg);color:var(--file-t);}.badge-dir{background:var(--dir-bg);color:var(--dir-t);}.badge-app{background:var(--app-bg);color:var(--app-t);}
.chip-acts{display:flex;gap:1px;opacity:0;transition:opacity .15s;margin-left:1px;}
.sc-chip:hover .chip-acts{opacity:1;}
.chip-act{background:none;border:none;cursor:pointer;padding:3px 5px;border-radius:6px;font-size:.68rem;color:var(--ink3);transition:all .15s;line-height:1;}
.chip-act:hover{background:var(--hover);color:var(--ink);}
.chip-act.del:hover{background:rgba(239,68,68,.12);color:#ef4444;}

/* Locked group */
.locked-wrap{position:relative;border-radius:12px;overflow:hidden;}
.locked-blur{filter:blur(5px);pointer-events:none;user-select:none;opacity:.35;}
.locked-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border-radius:12px;border:1px dashed color-mix(in srgb,var(--priv-t) 35%,transparent);background:color-mix(in srgb,var(--priv-bg) 60%,transparent);}
.locked-overlay .lock-icon{font-size:1.5rem;}
.locked-overlay p{font-size:.76rem;color:var(--priv-t);font-weight:500;}
.locked-overlay button{background:var(--priv-t);color:white;border:none;border-radius:8px;padding:7px 18px;font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:opacity .15s;}
.locked-overlay button:hover{opacity:.82;}
.empty-group{padding:8px 4px;color:var(--ink3);font-size:.76rem;}
.empty-main{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:65vh;color:var(--ink3);text-align:center;gap:10px;}
.empty-main .et{font-family:'DM Serif Display',serif;font-size:1.7rem;color:var(--ink2);}
.empty-main p{font-size:.82rem;line-height:1.8;}
.no-results{text-align:center;color:var(--ink3);font-size:.82rem;padding:60px;display:none;}
.no-results.show{display:block;}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;background:rgba(10,9,8,.55);backdrop-filter:blur(7px);z-index:100;display:none;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:28px;width:100%;max-width:440px;box-shadow:0 20px 60px var(--shadow);animation:slideUp .2s ease;position:relative;transition:background .22s,border-color .22s;}
@keyframes slideUp{from{opacity:0;transform:translateY(14px) scale(.98);}to{opacity:1;transform:none;}}
.modal-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-family:'DM Serif Display',serif;font-size:1.2rem;letter-spacing:-.01em;line-height:1.2;color:var(--ink);}
.modal-sub{font-size:.68rem;color:var(--ink3);margin-top:4px;line-height:1.6;}
.modal-close{background:none;border:1px solid var(--line);border-radius:50%;width:27px;height:27px;cursor:pointer;font-size:.72rem;color:var(--ink3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.modal-close:hover{border-color:var(--ink2);color:var(--ink);}
.form-row{margin-bottom:13px;}
label{display:block;font-size:.62rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px;}
input[type=text],input[type=password],select,textarea{width:100%;background:var(--chip-bg);border:1px solid var(--line);border-radius:8px;padding:9px 12px;color:var(--ink);font-family:'Outfit',sans-serif;font-size:.84rem;outline:none;transition:var(--tr);line-height:1.5;}
input[type=text]:focus,input[type=password]:focus,select:focus,textarea:focus{border-color:var(--ink2);}
input[type=text]::placeholder,input[type=password]::placeholder,textarea::placeholder{color:var(--ink3);}
select{cursor:pointer;}select option{background:var(--paper);}
textarea{resize:none;font-family:'DM Mono',monospace;font-size:.78rem;}
.type-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:13px;}
.type-tab{border:1px solid var(--line);border-radius:8px;padding:8px 4px;cursor:pointer;text-align:center;font-size:.66rem;font-weight:600;letter-spacing:.04em;color:var(--ink3);transition:all .15s;background:var(--chip-bg);user-select:none;}
.type-tab:hover{border-color:var(--ink3);color:var(--ink);}
.t-web{border-color:var(--web-t)!important;color:var(--web-t)!important;background:var(--web-bg)!important;}
.t-file{border-color:var(--file-t)!important;color:var(--file-t)!important;background:var(--file-bg)!important;}
.t-dir{border-color:var(--dir-t)!important;color:var(--dir-t)!important;background:var(--dir-bg)!important;}
.t-app{border-color:var(--app-t)!important;color:var(--app-t)!important;background:var(--app-bg)!important;}
.hint{font-size:.65rem;color:var(--ink3);margin-top:4px;line-height:1.7;white-space:pre-line;}
.check-row{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;background:var(--chip-bg);border:1px solid var(--line);border-radius:8px;cursor:pointer;transition:border-color .15s;}
.check-row:has(input:checked){border-color:var(--priv-t);background:var(--priv-bg);}
.check-row input[type=checkbox]{accent-color:var(--priv-t);width:14px;height:14px;cursor:pointer;margin-top:2px;flex-shrink:0;}
.check-row .check-label{font-size:.8rem;font-weight:500;color:var(--ink);cursor:pointer;}
.check-row .check-desc{font-size:.66rem;color:var(--ink3);margin-top:2px;}
.modal-actions{display:flex;gap:7px;margin-top:18px;}
.btn-save,.btn-cancel{flex:1;padding:10px;border-radius:8px;border:none;font-family:'Outfit',sans-serif;font-size:.81rem;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-save{background:var(--ink);color:var(--bg);}.btn-save:hover{opacity:.85;}
.btn-cancel{background:var(--chip-bg);color:var(--ink2);border:1px solid var(--line);}.btn-cancel:hover{border-color:var(--ink2);color:var(--ink);}

/* Path copy modal */
.path-modal{max-width:460px;}
.path-box-wrap{position:relative;}
.path-box{width:100%;background:var(--chip-bg);border:1px solid var(--line);border-radius:8px;padding:10px 44px 10px 12px;font-family:'DM Mono',monospace;font-size:.73rem;color:var(--ink);outline:none;resize:none;line-height:1.6;word-break:break-all;}
.copy-path-btn{position:absolute;top:50%;right:8px;transform:translateY(-50%);background:none;border:1px solid var(--line);border-radius:6px;padding:4px 8px;font-size:.65rem;color:var(--ink3);cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s;}
.copy-path-btn:hover{border-color:var(--ink2);color:var(--ink);}
.info-box{display:flex;gap:8px;align-items:flex-start;padding:10px 12px;border-radius:8px;margin:12px 0;font-size:.72rem;line-height:1.6;}
.info-box.warn{background:var(--dir-bg);border:1px solid color-mix(in srgb,var(--dir-t) 25%,transparent);color:var(--dir-t);}
.info-box.tip{background:var(--web-bg);border:1px solid color-mix(in srgb,var(--web-t) 25%,transparent);color:var(--web-t);}

/* PIN modal */
.pin-modal{max-width:310px;}
.pin-display{display:flex;gap:10px;justify-content:center;margin:18px 0 12px;}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--line);background:transparent;transition:all .15s;}
.pin-dot.filled{background:var(--ink);border-color:var(--ink);}
.pin-dot.error{background:#ef4444;border-color:#ef4444;}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;}
.pin-key{height:48px;border-radius:10px;border:1px solid var(--line);background:var(--chip-bg);font-family:'DM Mono',monospace;font-size:1rem;font-weight:500;color:var(--ink);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.pin-key:hover{background:var(--chip-hover);border-color:var(--ink3);}
.pin-key:active{transform:scale(.94);}
.pin-key.empty{background:transparent;border-color:transparent;cursor:default;}
.pin-error{text-align:center;font-size:.69rem;color:#ef4444;height:16px;margin-bottom:5px;}
.pin-hint{text-align:center;font-size:.68rem;color:var(--ink3);line-height:1.6;}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--bg);padding:8px 18px;border-radius:50px;font-size:.73rem;font-weight:500;opacity:0;transition:all .2s;z-index:999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="shell">

<!-- ═══ SIDEBAR ═══ -->
<aside>
  <div class="brand">Launcher</div>
  <div class="tagline">Personal workspace</div>

  <button class="theme-toggle" onclick="toggleTheme()">
    <div class="toggle-track"><div class="toggle-thumb"></div></div>
    <span class="toggle-label" id="themeLabel">Sáng</span>
    <span class="toggle-ico" id="themeIco">☀️</span>
  </button>

  <div class="clock-block">
    <div id="clock">--:--</div>
    <div id="date-solar"></div>
    <div id="date-lunar"></div>
  </div>

  <div class="weather-card">
    <div class="weather-loading" id="weatherLoading"><span>⏳</span> Đang lấy thời tiết...</div>
    <div class="weather-body" id="weatherBody" style="display:none">
      <div class="weather-icon" id="wIcon"></div>
      <div><div class="weather-temp" id="wTemp"></div><div class="weather-desc" id="wDesc"></div><div class="weather-city" id="wCity"></div></div>
    </div>
    <div class="weather-extra" id="weatherExtra" style="display:none">
      <div class="weather-stat"><b id="wHumidity">--</b>% 💧</div>
      <div class="weather-stat"><b id="wWind">--</b> km/h 🌬</div>
      <div class="weather-stat"><b id="wFeels">--</b>°C 🌡</div>
    </div>
    <button class="weather-retry" id="weatherRetry" style="display:none" onclick="fetchWeather()">↺</button>
  </div>

  <div class="search-wrap">
    <svg class="search-icon" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 16 16"><circle cx="7" cy="7" r="5"/><path d="M12 12l-2-2"/></svg>
    <input id="searchInput" type="text" placeholder="Tìm kiếm...  (/)">
  </div>

  <div class="nav-label">Nhóm</div>
  <nav class="nav-groups" id="navGroups"></nav>

  <div class="sidebar-footer">
    <button class="sb-btn" onclick="openModal('shortcut')">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Thêm shortcut
    </button>
    <button class="sb-btn" onclick="openModal('group')">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>Thêm nhóm
    </button>
    <button class="sb-btn" onclick="openChangePinModal()">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Đổi passcode
    </button>
  </div>
</aside>

<!-- ═══ MAIN ═══ -->
<main id="mainContent"></main>
</div>

<!-- ═══ MODAL: SHORTCUT / GROUP ═══ -->
<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="modal">
    <div class="modal-hd"><div><div class="modal-title" id="modalTitle">Thêm shortcut</div><div class="modal-sub" id="modalSub"></div></div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div id="formGroup" style="display:none">
      <div class="form-row"><label>Tên nhóm</label><input type="text" id="groupName" placeholder="VD: Công việc, Dev Tools..."></div>
      <div class="form-row">
        <div class="check-row" onclick="document.getElementById('groupLocked').click()">
          <input type="checkbox" id="groupLocked" onclick="event.stopPropagation()">
          <div><div class="check-label">🔒 Nhóm riêng tư (có passcode)</div><div class="check-desc">Yêu cầu nhập passcode trước khi xem</div></div>
        </div>
      </div>
    </div>
    <div id="formShortcut" style="display:none">
      <div class="form-row"><label>Loại</label>
        <div class="type-tabs">
          <div class="type-tab" data-type="web"  onclick="setType('web')">🌐 Web</div>

<script>
// ════ THEME ══════════════════════════════════
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('launcher_theme',t);document.getElementById('themeLabel').textContent=t==='dark'?'Tối':'Sáng';document.getElementById('themeIco').textContent=t==='dark'?'🌙':'☀️';}
function toggleTheme(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}
applyTheme(localStorage.getItem('launcher_theme')||'light');

// ════ LUNAR ══════════════════════════════════
const TZ=7;
function jdFromDate(d,m,y){var a=Math.floor((14-m)/12),yy=y+4800-a,mm=m+12*a-3,jd=d+Math.floor((153*mm+2)/5)+365*yy+Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400)-32045;if(jd<2299161)jd=d+Math.floor((153*mm+2)/5)+365*yy+Math.floor(yy/4)-32083;return jd;}
function nmd(k,tz){var T=k/1236.85,T2=T*T,T3=T2*T,dr=Math.PI/180,J=2415020.75933+29.53058868*k+0.0001178*T2-0.000000155*T3;J+=0.00033*Math.sin((166.56+132.87*T-0.009173*T2)*dr);var M=357.52910+29.10535608*k-0.0000333*T2-0.00000347*T3,Mp=306.0253+385.81691806*k+0.0107306*T2+0.00001236*T3,F=21.2964+390.67050646*k-0.0016528*T2-0.00000239*T3,C=(0.1734-0.000393*T)*Math.sin(M*dr)+0.0021*Math.sin(2*dr*M)-0.4068*Math.sin(Mp*dr)+0.0161*Math.sin(dr*2*Mp)-0.0004*Math.sin(dr*3*Mp)+0.0104*Math.sin(dr*2*F)-0.0051*Math.sin(dr*(M+Mp))-0.0074*Math.sin(dr*(M-Mp))+0.0004*Math.sin(dr*(2*F+M))-0.0004*Math.sin(dr*(2*F-M))-0.0006*Math.sin(dr*(2*F+Mp))+0.0010*Math.sin(dr*(2*F-Mp))+0.0005*Math.sin(dr*(2*Mp+M)),dt=T<-11?0.001+0.000839*T+0.0002261*T2-0.00000845*T3-0.000000081*T*T3:-0.000278+0.000265*T+0.000262*T2;return Math.floor(J+C-dt+0.5+tz/24);}
function sl(jdn,tz){var T=(jdn-2451545.5-tz/24)/36525,T2=T*T,dr=Math.PI/180,M=357.52910+35999.05030*T-0.0001559*T2-0.00000048*T*T2,L=(280.46645+36000.76983*T+0.0003032*T2+(1.9146-0.004817*T-0.000014*T2)*Math.sin(dr*M)+(0.019993-0.000101*T)*Math.sin(dr*2*M)+0.00029*Math.sin(dr*3*M)-0.00569-0.00478*Math.sin((125.04-1934.136*T)*dr))*dr;L-=Math.PI*2*Math.floor(L/(Math.PI*2));return Math.floor(L/Math.PI*6);}
function lm11(y,tz){var k=Math.floor((jdFromDate(31,12,y)-2415021)/29.530588853),nm=nmd(k,tz);if(sl(nm,tz)>=9)nm=nmd(k-1,tz);return nm;}
function lo(a11,tz){var k=Math.floor((a11-2415021.076998695)/29.530588853+0.5),i=1,arc=sl(nmd(k+i,tz),tz),last=0;do{last=arc;i++;arc=sl(nmd(k+i,tz),tz);}while(arc!==last&&i<14);return i-1;}
function solar2Lunar(d,m,y){var dn=jdFromDate(d,m,y),k=Math.floor((dn-2415021.076998695)/29.530588853),ms=nmd(k+1,TZ);if(ms>dn)ms=nmd(k,TZ);var a11=lm11(y,TZ),b11=a11,lY,lM,lD,lL=0;if(a11>=ms){lY=y;a11=lm11(y-1,TZ);}else{lY=y+1;b11=lm11(y+1,TZ);}lD=dn-ms+1;var diff=Math.floor((ms-a11)/29);lM=diff+11;if(b11-a11>365){var lmd=lo(a11,TZ);if(diff>=lmd){lM=diff+10;if(diff===lmd)lL=1;}}if(lM>12)lM-=12;if(lM>=11&&diff<4)lY-=1;return{day:lD,month:lM,year:lY,leap:lL};}
const CAN=['Giáp','Ất','Bính','Đinh','Mậu','Kỷ','Canh','Tân','Nhâm','Quý'],CHI=['Tý','Sửu','Dần','Mão','Thìn','Tỵ','Ngọ','Mùi','Thân','Dậu','Tuất','Hợi'];
function yearName(y){return CAN[(y+6)%10]+' '+CHI[(y+8)%12];}
function tick(){const n=new Date();document.getElementById('clock').textContent=n.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit',hour12:false});document.getElementById('date-solar').textContent=n.toLocaleDateString('vi-VN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});const lu=solar2Lunar(n.getDate(),n.getMonth()+1,n.getFullYear());document.getElementById('date-lunar').textContent=`🌙 ${lu.day} tháng ${lu.month}${lu.leap?' (nhuận)':''} — ${yearName(lu.year)}`;}
setInterval(tick,1000);tick();

// ════ WEATHER ════════════════════════════════
const WMO={0:['☀️','Trời quang'],1:['🌤','Ít mây'],2:['⛅','Có mây'],3:['☁️','Nhiều mây'],45:['🌫','Sương mù'],48:['🌫','Sương giá'],51:['🌦','Mưa phùn nhẹ'],53:['🌦','Mưa phùn'],55:['🌧','Mưa phùn nặng'],61:['🌧','Mưa nhẹ'],63:['🌧','Có mưa'],65:['🌧','Mưa to'],80:['🌦','Mưa rào nhẹ'],81:['🌦','Mưa rào'],82:['⛈','Mưa rào nặng'],95:['⛈','Giông bão'],96:['⛈','Giông + mưa đá'],99:['⛈','Giông lớn']};
function wmoInfo(c){const ks=Object.keys(WMO).map(Number).sort((a,b)=>b-a);for(const k of ks)if(c>=k)return WMO[k];return['🌡','Không rõ'];}
async function fetchWeather(){
  document.getElementById('weatherLoading').style.display='flex';
  ['weatherBody','weatherExtra'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('weatherRetry').style.display='none';
  if(!navigator.geolocation){document.getElementById('weatherLoading').innerHTML='<span>📍</span> Không có GPS';document.getElementById('weatherRetry').style.display='block';return;}
  navigator.geolocation.getCurrentPosition(async p=>{
    const{latitude:lat,longitude:lon}=p.coords;
    try{
      const[mr,gr]=await Promise.all([fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code,relative_humidity_2m,wind_speed_10m&wind_speed_unit=kmh&timezone=auto`),fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)]);
      const m=await mr.json(),g=await gr.json(),c=m.current,[ico,desc]=wmoInfo(c.weather_code);
      document.getElementById('wIcon').textContent=ico;document.getElementById('wTemp').textContent=Math.round(c.temperature_2m)+'°C';document.getElementById('wDesc').textContent=desc;document.getElementById('wCity').textContent='📍 '+(g.address?.city||g.address?.town||g.address?.county||'Vị trí hiện tại');document.getElementById('wHumidity').textContent=c.relative_humidity_2m;document.getElementById('wWind').textContent=Math.round(c.wind_speed_10m);document.getElementById('wFeels').textContent=Math.round(c.apparent_temperature);
      document.getElementById('weatherLoading').style.display='none';document.getElementById('weatherBody').style.display='flex';document.getElementById('weatherExtra').style.display='flex';document.getElementById('weatherRetry').style.display='block';
    }catch(e){document.getElementById('weatherLoading').innerHTML='<span>⚠️</span> Không lấy được';document.getElementById('weatherRetry').style.display='block';}
  },()=>{document.getElementById('weatherLoading').innerHTML='<span>📍</span> Từ chối vị trí';document.getElementById('weatherRetry').style.display='block';},{timeout:8000});
}
fetchWeather();

// ════ DATA ═══════════════════════════════════
const DEFAULTS={
  groups:[{id:'g1',name:'Web & Tools',locked:false},{id:'g2',name:'File & Thư mục',locked:false},{id:'g_priv',name:'Riêng tư',locked:true}],
  shortcuts:[
    {id:'s1',name:'Google',url:'https://google.com',type:'web',group:'g1'},
    {id:'s2',name:'YouTube',url:'https://youtube.com',type:'web',group:'g1'},
    {id:'s3',name:'GitHub',url:'https://github.com',type:'web',group:'g1'},
    {id:'s4',name:'ChatGPT',url:'https://chat.openai.com',type:'web',group:'g1'},
    {id:'s5',name:'Notion',url:'https://notion.so',type:'web',group:'g1'},
    {id:'s6',name:'Ví dụ riêng tư',url:'https://example.com',type:'web',group:'g_priv'},
  ]
};
let data=JSON.parse(localStorage.getItem('launcher_v4')||'null')||DEFAULTS;
let editMode=null,currentType='web',filterQ='';
const unlockedGroups=new Set();
function save(){localStorage.setItem('launcher_v4',JSON.stringify(data));}
function genId(){return '_'+Math.random().toString(36).slice(2,8);}

// ════ PIN ════════════════════════════════════
const HASH_KEY='launcher_pin_hash';
let pinBuffer='',pinMode=null,pinStep2Temp='',pinTarget=null,_pinCallback=null,_pendingGroup=null;

async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
async function checkPin(p){const h=localStorage.getItem(HASH_KEY);if(!h)return true;return(await sha256(p))===h;}
async function setPin(p){localStorage.setItem(HASH_KEY,await sha256(p));}
function hasPin(){return!!localStorage.getItem(HASH_KEY);}

/**
 * Xác minh passcode, sau đó chạy callback.
 * Dùng cho: Sửa nhóm có khoá, Xóa nhóm có khoá, Gỡ khoá nội dung
 */
function verifyPinThen(callback, subtitle=''){
  if(!hasPin()){callback();return;}
  _pinCallback=callback;
  openPinModal('verify', null, subtitle);
}

function buildPinPad(){const pad=document.getElementById('pinPad');pad.innerHTML='';[...Array(9)].map((_,i)=>String(i+1)).concat(['','0','⌫']).forEach(k=>{const b=document.createElement('div');b.className='pin-key'+(k===''?' empty':'');b.textContent=k;if(k!=='')b.addEventListener('click',()=>k==='⌫'?pinInput(null):pinInput(k));pad.appendChild(b);});}
function updatePinDots(shake=false){const d=document.getElementById('pinDisplay');d.innerHTML='';for(let i=0;i<6;i++){const dot=document.createElement('div');dot.className='pin-dot'+(i<pinBuffer.length?' filled':'')+(shake?' error':'');d.appendChild(dot);}}
function pinInput(digit){document.getElementById('pinError').textContent='';if(digit===null){pinBuffer=pinBuffer.slice(0,-1);updatePinDots();return;}if(pinBuffer.length>=6)return;pinBuffer+=digit;updatePinDots();if(pinBuffer.length===6)setTimeout(submitPin,120);}

async function submitPin(){
  const pin=pinBuffer;pinBuffer='';

  // ── Xác minh để chạy callback (sửa/xóa nhóm khoá)
  if(pinMode==='verify'){
    if(await checkPin(pin)){
      const cb=_pinCallback;_pinCallback=null;
      closePinModal();
      cb?.();
    }else{
      updatePinDots(true);document.getElementById('pinError').textContent='Passcode không đúng.';
      setTimeout(()=>updatePinDots(false),600);
    }
    return;
  }

  // ── Mở khoá nhóm để xem
  if(pinMode==='unlock'){
    if(await checkPin(pin)){unlockedGroups.add(pinTarget);closePinModal();render();toast('🔓 Đã mở khoá nhóm');}
    else{updatePinDots(true);document.getElementById('pinError').textContent='Passcode không đúng.';setTimeout(()=>updatePinDots(false),600);}
    return;
  }

  // ── Tạo passcode bước 1
  if(pinMode==='set-step1'){
    if(pin.length<4){document.getElementById('pinError').textContent='Tối thiểu 4 chữ số';updatePinDots();return;}
    pinStep2Temp=pin;pinMode='set-step2';
    document.getElementById('pinTitle').textContent='Xác nhận passcode';
    document.getElementById('pinSub').textContent='Nhập lại để xác nhận';
    document.getElementById('pinHint').textContent='';updatePinDots();return;
  }

  // ── Tạo passcode bước 2
  if(pinMode==='set-step2'){
    if(pin===pinStep2Temp){
      await setPin(pin);closePinModal();toast('✅ Đã tạo passcode');
    }else{
      pinMode='set-step1';pinStep2Temp='';
      document.getElementById('pinTitle').textContent='Tạo passcode mới';
      document.getElementById('pinSub').textContent='Nhập passcode 4–6 chữ số';
      document.getElementById('pinError').textContent='Không khớp. Thử lại từ đầu.';updatePinDots();
    }
    return;
  }

  // ── Đổi passcode: xác minh cũ
  if(pinMode==='change-verify'){
    if(await checkPin(pin)){
      pinMode='set-step1';pinStep2Temp='';
      document.getElementById('pinTitle').textContent='Tạo passcode mới';
      document.getElementById('pinSub').textContent='Nhập passcode mới (4–6 chữ số)';
      document.getElementById('pinHint').textContent='';updatePinDots();
    }else{
      updatePinDots(true);document.getElementById('pinError').textContent='Passcode cũ không đúng.';setTimeout(()=>updatePinDots(false),600);
    }
    return;
  }
}

function openPinModal(mode, gid, subtitle=''){
  pinBuffer='';pinMode=mode;pinTarget=gid||null;
  buildPinPad();updatePinDots();document.getElementById('pinError').textContent='';
  const cfg={
    verify:       ['🔐 Xác minh passcode', subtitle||'Nhập passcode để tiếp tục'],
    unlock:       ['Nhập passcode', ()=>{const g=data.groups.find(x=>x.id===gid);return `Nhóm "${g?.name||''}"`;} ],
    'set-step1':  ['Tạo passcode', 'Nhập passcode mới (4–6 chữ số)'],
    'change-verify':['Xác minh passcode cũ','Nhập passcode hiện tại'],
  }[mode]||['Passcode',''];
  document.getElementById('pinTitle').textContent=cfg[0];
  document.getElementById('pinSub').textContent=typeof cfg[1]==='function'?cfg[1]():cfg[1];
  document.getElementById('pinHint').textContent=mode==='set-step1'?'Dùng để bảo vệ các nhóm riêng tư':'';
  document.getElementById('pinOverlay').classList.add('show');
}

function closePinModal(){
  document.getElementById('pinOverlay').classList.remove('show');
  pinBuffer='';pinTarget=null;
  const mode=pinMode;pinMode=null;_pinCallback=null;
  // Sau khi tạo PIN lần đầu — hoàn tất thêm nhóm pending
  if((mode==='set-step2')&&_pendingGroup){
    const pg=_pendingGroup;_pendingGroup=null;
    data.groups.push({id:genId(),name:pg.name,locked:pg.locked});
    save();render();toast('Đã thêm nhóm có khoá');
  }
}

function openChangePinModal(){hasPin()?openPinModal('change-verify'):openPinModal('set-step1');}

document.addEventListener('keydown',e=>{
  if(!document.getElementById('pinOverlay').classList.contains('show'))return;
  if(e.key>='0'&&e.key<='9')pinInput(e.key);
  if(e.key==='Backspace')pinInput(null);
  if(e.key==='Escape')closePinModal();
});

// ════ LAUNCH ═════════════════════════════════
const TYPE_META={
  web: {label:'Web',   urlLabel:'URL website',         placeholder:'https://example.com',              hint:'Nhập địa chỉ bắt đầu bằng https://'},
  file:{label:'File',  urlLabel:'Đường dẫn file',      placeholder:'file:///F:/path/to/file.html',     hint:'Nhập dạng file:// URL\nVí dụ: file:///F:/PHIM/preview.html\nTrình duyệt có thể mở: HTML, PDF, ảnh, video\nFile khác (.docx, .exe): dùng loại App/Folder'},
  dir: {label:'Folder',urlLabel:'Đường dẫn thư mục',  placeholder:'file:///F:/DUNG%20PHIM/_THU%20VIEN',hint:'Nhập dạng file:// URL\nVí dụ: file:///F:/Projects\nMột số trình duyệt (Firefox) sẽ mở thư mục'},
  app: {label:'App',   urlLabel:'Đường dẫn ứng dụng', placeholder:'C:\\Program Files\\app.exe',        hint:'Trình duyệt không thể chạy .exe trực tiếp.\nShortcut này sẽ cho phép copy đường dẫn nhanh\nđể mở thủ công qua Run (Win+R) hoặc Explorer.'},
};

function winPathToFileUrl(p){
  // C:\Users\... → file:///C:/Users/...
  return 'file:///'+p.replace(/\\/g,'/');
}

function launch(sc){
  const url=sc.url.trim();
  if(!url)return;

  // Web — bình thường
  if(sc.type==='web'){window.open(url,'_blank');return;}

  // App — không thể chạy từ browser; hiện copy modal
  if(sc.type==='app'){
    const display=/^[A-Za-z]:[\\\/]/.test(url)?url:url;
    showPathModal(sc.name, display, '⚙️ Trình duyệt không thể chạy ứng dụng trực tiếp.\nCopy đường dẫn → dán vào Run (Win+R) hoặc thanh địa chỉ Explorer.');
    return;
  }

  // File / Dir — thử mở bằng anchor
  let href=url;
  // Nếu là Windows path (C:\...) chuyển thành file:// URL
  if(/^[A-Za-z]:[\\\/]/.test(url)){href=winPathToFileUrl(url);}

  // Thử mở qua anchor
  const a=document.createElement('a');
  a.href=href;
  a.target='_blank';
  a.rel='noopener';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  // Với Folder trên Chrome thường bị chặn — show copy hint sau 300ms nếu không có gì xảy ra
  if(sc.type==='dir'){
    setTimeout(()=>{
      showPathModal(sc.name, decodeURIComponent(href),
        '📁 Nếu thư mục không mở được, copy đường dẫn và dán vào thanh địa chỉ của Explorer.\nFirefox hỗ trợ mở thư mục tốt hơn Chrome.');
    },350);
  }
}

// ════ PATH COPY MODAL ════════════════════════
function showPathModal(name,path,info=''){
  document.getElementById('pathModalTitle').textContent=name;
  document.getElementById('pathBox').value=path;
  const infoEl=document.getElementById('pathInfo');
  if(info){infoEl.textContent=info;infoEl.style.display='flex';}else{infoEl.style.display='none';}
  document.getElementById('pathOverlay').classList.add('show');
}
function closePathModal(){document.getElementById('pathOverlay').classList.remove('show');}
function copyPathBox(){navigator.clipboard.writeText(document.getElementById('pathBox').value).then(()=>toast('✅ Đã copy!'));}

// ════ RENDER ═════════════════════════════════
function renderNav(){const nav=document.getElementById('navGroups');nav.innerHTML='';data.groups.forEach(g=>{const c=data.shortcuts.filter(s=>s.group===g.id).length,d=document.createElement('div');d.className='nav-item';d.innerHTML=`<span>${esc(g.name)}${g.locked?'<span class="lock-ico"> 🔒</span>':''}</span><span class="nav-count">${c}</span>`;d.onclick=()=>document.getElementById(g.id)?.scrollIntoView({behavior:'smooth',block:'start'});nav.appendChild(d);});}

function render(){
  const main=document.getElementById('mainContent'),q=filterQ.toLowerCase();
  main.innerHTML='';let total=0;
  if(!data.groups.length){main.innerHTML=`<div class="empty-main"><div class="et">Bắt đầu nào!</div><p>Thêm nhóm và shortcut để<br>tổ chức workspace của bạn.</p></div>`;renderNav();return;}
  data.groups.forEach((g,gi)=>{
    const scs=data.shortcuts.filter(s=>s.group===g.id&&(!q||s.name.toLowerCase().includes(q)||s.url.toLowerCase().includes(q)));
    if(q&&!scs.length)return;total+=scs.length;
    const isLocked=g.locked&&!unlockedGroups.has(g.id);
    const sec=document.createElement('section');sec.className='group-section';sec.id=g.id;sec.style.animationDelay=`${gi*.06}s`;
    const lockBadge=g.locked?`<span class="group-lock-badge">${isLocked?'🔒 Đã khoá':'🔓 Đã mở'}</span>`:'';
    sec.innerHTML=`
      <div class="group-top">
        <div class="group-name">${esc(g.name)}${lockBadge}</div>
        <div class="group-meta">
          <span class="group-count">${scs.length}</span>
          ${g.locked&&isLocked ?`<button class="grp-btn unlock-btn" onclick="openLockGroup('${g.id}')">🔓 Mở khoá</button>`:''}
          ${g.locked&&!isLocked?`<button class="grp-btn" onclick="relockGroup('${g.id}')">🔒 Khoá lại</button>`:''}
          <button class="grp-btn" onclick="addToGroup('${g.id}')">+ Thêm</button>
          <button class="grp-btn" onclick="editGroupSecure('${g.id}')">Sửa</button>
          <button class="grp-btn danger" onclick="deleteGroupSecure('${g.id}')">Xóa</button>
        </div>
      </div>
      <div class="${isLocked?'locked-wrap':''}">
        <div class="shortcut-chips${isLocked?' locked-blur':''}" id="chips-${g.id}"></div>
        ${isLocked?`<div class="locked-overlay"><div class="lock-icon">🔒</div><p>Nhóm riêng tư</p><button onclick="openLockGroup('${g.id}')">Nhập passcode</button></div>`:''}
      </div>`;
    main.appendChild(sec);
    const chips=sec.querySelector(`#chips-${g.id}`);
    if(!scs.length){chips.innerHTML=`<div class="empty-group">Chưa có shortcut — nhấn "+ Thêm"</div>`;}
    else scs.forEach((sc,si)=>{
      const chip=document.createElement('div');chip.className='sc-chip';chip.style.animationDelay=`${si*.025}s`;
      chip.innerHTML=`<div class="chip-dot dot-${sc.type}"></div><span class="chip-name">${esc(sc.name)}</span><span class="chip-badge badge-${sc.type}">${TYPE_META[sc.type]?.label||sc.type}</span><div class="chip-acts"><button class="chip-act" onclick="editSc('${sc.id}');event.stopPropagation()">✏️</button><button class="chip-act del" onclick="deleteSc('${sc.id}');event.stopPropagation()">✕</button></div>`;
      if(!isLocked)chip.addEventListener('click',()=>launch(sc));
      chips.appendChild(chip);
    });
  });
  if(q&&total===0){const nr=document.createElement('div');nr.className='no-results show';nr.textContent='Không tìm thấy kết quả nào.';main.appendChild(nr);}
  renderNav();
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ════ GROUP ACTIONS (secure) ══════════════════
function openLockGroup(gid){
  if(!hasPin()){_pendingGroup=null;pinTarget=gid;openPinModal('set-step1');return;}
  openPinModal('unlock',gid);
}
function relockGroup(gid){unlockedGroups.delete(gid);render();toast('🔒 Đã khoá lại');}
function addToGroup(gid){openModal('shortcut','',gid);}

/** Sửa nhóm — nếu nhóm đang khoá, bắt buộc xác minh passcode trước */
function editGroupSecure(gid){
  const g=data.groups.find(x=>x.id===gid);
  if(g?.locked){
    verifyPinThen(()=>openModal('group',gid), `Xác minh để sửa nhóm "${g.name}"`);
  }else{
    openModal('group',gid);
  }
}

/** Xóa nhóm — nếu nhóm đang khoá, bắt buộc xác minh passcode trước */
function deleteGroupSecure(gid){
  const g=data.groups.find(x=>x.id===gid);
  if(g?.locked){
    verifyPinThen(()=>_deleteGroup(gid), `Xác minh để xóa nhóm "${g.name}"`);
  }else{
    _deleteGroup(gid);
  }
}
function _deleteGroup(id){
  if(!confirm('Xóa nhóm và toàn bộ shortcut bên trong?'))return;
  data.groups=data.groups.filter(g=>g.id!==id);
  data.shortcuts=data.shortcuts.filter(s=>s.group!==id);
  unlockedGroups.delete(id);save();render();toast('Đã xóa nhóm');
}

// ════ SHORTCUT EDIT ═══════════════════════════
function editSc(id){const sc=data.shortcuts.find(s=>s.id===id);if(sc)openModal(sc.type,id);}
function deleteSc(id){data.shortcuts=data.shortcuts.filter(s=>s.id!==id);save();render();toast('Đã xóa');}

// ════ MODAL: ADD/EDIT ════════════════════════
function openModal(type,editId='',groupPreset=''){
  const isGroup=type==='group';editMode=editId?{type,id:editId}:null;
  if(!isGroup&&editId)currentType=data.shortcuts.find(s=>s.id===editId)?.type||'web';
  else if(!isGroup)currentType=type==='shortcut'?'web':type;
  document.getElementById('formGroup').style.display=isGroup?'':'none';
  document.getElementById('formShortcut').style.display=isGroup?'none':'';
  document.getElementById('modalTitle').textContent=editId?(isGroup?'Sửa nhóm':'Sửa shortcut'):(isGroup?'Thêm nhóm mới':'Thêm shortcut');
  document.getElementById('modalSub').textContent='';
  if(isGroup){
    const g=editId?data.groups.find(x=>x.id===editId):null;
    document.getElementById('groupName').value=g?.name||'';
    document.getElementById('groupLocked').checked=g?.locked||false;
  }else{
    const sel=document.getElementById('scGroup');
    sel.innerHTML=data.groups.map(g=>`<option value="${g.id}">${esc(g.name)}</option>`).join('');
    if(groupPreset)sel.value=groupPreset;
    if(editId){const sc=data.shortcuts.find(s=>s.id===editId);if(sc){document.getElementById('scName').value=sc.name;document.getElementById('scUrl').value=sc.url;sel.value=sc.group;setType(sc.type,false);}}
    else{document.getElementById('scName').value='';document.getElementById('scUrl').value='';setType(currentType,false);}
  }
  document.getElementById('overlay').classList.add('show');
}
function setType(t,clearUrl=true){currentType=t;if(clearUrl)document.getElementById('scUrl').value='';const m=TYPE_META[t];document.getElementById('urlLabel').textContent=m.urlLabel;document.getElementById('scUrl').placeholder=m.placeholder;document.getElementById('urlHint').textContent=m.hint;document.querySelectorAll('.type-tab').forEach(tab=>{tab.className='type-tab';if(tab.dataset.type===t)tab.classList.add(`t-${t}`);});}
function closeModal(){document.getElementById('overlay').classList.remove('show');editMode=null;}
function closeOverlay(e){if(e.target===document.getElementById('overlay'))closeModal();}

function saveItem(){
  const isGroup=document.getElementById('formGroup').style.display!=='none';
  if(isGroup){
    const name=document.getElementById('groupName').value.trim();
    const locked=document.getElementById('groupLocked').checked;
    if(!name)return toast('⚠ Nhập tên nhóm');

    // Nếu đang sửa nhóm có khoá và muốn BỎ khoá → đã verify ở editGroupSecure rồi → OK
    // Nếu đang thêm nhóm mới có khoá mà chưa có PIN → tạo PIN trước
    if(!editMode && locked && !hasPin()){
      closeModal();_pendingGroup={name,locked};
      setTimeout(()=>openPinModal('set-step1'),350);return;
    }
    if(editMode){const g=data.groups.find(x=>x.id===editMode.id);if(g){g.name=name;g.locked=locked;}toast('Đã cập nhật nhóm');}
    else{data.groups.push({id:genId(),name,locked});toast('Đã thêm nhóm');}
  }else{
    const name=document.getElementById('scName').value.trim(),url=document.getElementById('scUrl').value.trim(),group=document.getElementById('scGroup').value;
    if(!name)return toast('⚠ Nhập tên shortcut');
    if(!url)return toast('⚠ Nhập URL hoặc đường dẫn');
    if(!group)return toast('⚠ Chọn nhóm');
    if(editMode){const sc=data.shortcuts.find(s=>s.id===editMode.id);if(sc)Object.assign(sc,{name,url,group,type:currentType});toast('Đã cập nhật');}
    else{data.shortcuts.push({id:genId(),name,url,group,type:currentType});toast('Đã thêm shortcut');}
  }
  save();render();closeModal();
}

// ════ SEARCH + KEYBOARD ══════════════════════
document.getElementById('searchInput').addEventListener('input',e=>{filterQ=e.target.value;render();});
document.addEventListener('keydown',e=>{
  if(['pinOverlay','pathOverlay'].some(id=>document.getElementById(id).classList.contains('show')))return;
  if(e.key==='Escape')closeModal();
  if(e.key==='/'&&document.activeElement.tagName!=='INPUT'){e.preventDefault();document.getElementById('searchInput').focus();}
});
let _tt;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2300);}

render();
